{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Agri Dashboard{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}"
          ><i class="bi bi-gear-fill"></i> AgriManager</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'sales' %}"
                ><i class="bi bi-cart"></i> Sales</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'purchase' %}"
                ><i class="bi bi-box-seam"></i> Purchase</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dispatch' %}"
                ><i class="bi bi-truck"></i> Dispatch</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'procurement' %}"
                ><i class="bi bi-bag-check"></i> Procurement</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'farmers' %}"
                ><i class="bi bi-people"></i> Farmers</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'payments' %}"
                ><i class="bi bi-currency-exchange"></i> Payments</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <footer class="bg-white border-top py-3 mt-auto">
      <div class="container d-flex justify-content-between small text-muted">
        <span>AgriManager full-stack system</span>
        <span>© <span id="currentYear"></span> Agri Dashboard</span>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="{% static 'core/js/app.js' %}"></script>
  </body>
</html>
